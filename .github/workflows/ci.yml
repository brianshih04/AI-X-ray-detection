name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  # ── Job 1: Lint ──────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lint deps
        run: pip install ruff

      - name: Ruff check
        run: ruff check api_build_onnx/ --ignore E501

  # ── Job 2: Unit Tests ────────────────────────────────────
  test:
    name: Tests (Python ${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python }}-${{ hashFiles('api_build_onnx/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python }}-

      - name: Install dependencies
        run: |
          cd api_build_onnx
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run tests
        run: |
          cd api_build_onnx
          pytest tests/ -v --tb=short -q

  # ── Job 3: Docker Build (Frontend) ──────────────────────
  docker-build-frontend:
    name: Docker Build (Frontend)
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 4: Docker Build (API, needs model files) ────────
  docker-build-api:
    name: Docker Build (API)
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Create placeholder models for build test
        run: |
          mkdir -p api_build_onnx/models
          for f in best_model.onnx best_model_cam.onnx; do
            if [ ! -f "api_build_onnx/models/$f" ]; then touch "api_build_onnx/models/$f"; fi
          done
          for f in best_model.onnx.data best_model_cam.onnx.data; do
            if [ ! -f "api_build_onnx/models/$f" ]; then dd if=/dev/zero bs=1M count=1 of="api_build_onnx/models/$f" 2>/dev/null; fi
          done

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: ./api_build_onnx
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
