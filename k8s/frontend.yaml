apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-xray-frontend
  namespace: ai-xray
  labels:
    app: ai-xray-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-xray-frontend
  template:
    metadata:
      labels:
        app: ai-xray-frontend
    spec:
      containers:
      - name: nginx
        image: ai-xray-frontend:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 80
          name: http
        resources:
          requests:
            memory: "32Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 5
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 3
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: ai-xray-frontend-nodeport
  namespace: ai-xray
spec:
  type: NodePort
  selector:
    app: ai-xray-frontend
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30800
    protocol: TCP
