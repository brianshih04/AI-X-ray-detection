apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-xray-api
  namespace: ai-xray
  labels:
    app: ai-xray-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-xray-api
  template:
    metadata:
      labels:
        app: ai-xray-api
    spec:
      containers:
      - name: api
        image: ai-xray-api:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8000
          name: http
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1"
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: database-url
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 15
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
