# Chest X-ray Multi-label Classification — V2 Config (Optimized)
#
# Changes from v1:
#   - Loss: ASL (Asymmetric Loss) — reduces false positive over-prediction
#   - Backbone: ConvNeXt-Tiny — modern architecture with better feature extraction
#   - Resolution: 320px (up from 224) — better for small lesions (nodules, fibrosis)
#   - Augmentation: RandomResizedCrop + GaussianBlur + RandomErasing
#   - More epochs (50) + longer warmup
#   - Per-label optimal thresholds saved for API

data:
  data_dir: /home/avuser/projects/ai-xray-detection/data
  train_csv: train.csv
  valid_csv: val.csv
  img_size: 320
  num_workers: 8
  pin_memory: true
  uncertain_policy: zero

labels:
  - Atelectasis
  - Cardiomegaly
  - Consolidation
  - Edema
  - Effusion
  - Emphysema
  - Fibrosis
  - Hernia
  - Infiltration
  - Mass
  - Nodule
  - Pleural_Thickening
  - Pneumonia
  - Pneumothorax
  - No Finding

model:
  backbone: convnext_tiny
  pretrained: true
  num_classes: 15
  freeze_backbone_epochs: 5
  dropout: 0.3

training:
  num_epochs: 50
  batch_size: 16
  lr_head: 0.001
  lr_backbone: 0.00005
  weight_decay: 0.05
  optimizer: adamw
  betas: [0.9, 0.999]
  amp: true
  grad_accum_steps: 2
  clip_grad_norm: 1.0

loss:
  type: asl
  asl_gamma_neg: 4.0
  asl_gamma_pos: 0.0
  asl_clip: 0.05

scheduler:
  type: cosine
  T_max: 50
  eta_min: 0.000001

augmentation:
  random_resized_crop: true
  rrc_scale: [0.8, 1.0]
  rrc_ratio: [0.9, 1.1]
  random_horizontal_flip: 0.5
  random_affine: true
  random_rotation: 10
  random_translate: [0.05, 0.05]
  random_scale: [0.9, 1.1]
  color_jitter: 0.15
  contrast_jitter: 0.15
  gaussian_blur: 0.3
  blur_kernel: 5
  blur_sigma: [0.1, 2.0]
  random_erasing: 0.2
  erasing_scale: [0.02, 0.15]

callbacks:
  early_stopping:
    enabled: true
    patience: 10
    min_delta: 0.001
    monitor: val_auc
    mode: max
  checkpoint:
    monitor: val_auc
    mode: max
    save_best: true
    save_last: true
    save_top_k: 3

tracking:
  type: csv
  log_interval: 10

export:
  onnx: true
  onnx_opset: 17
  dynamic_batch: true
  torchscript: true

output:
  dir: /home/avuser/projects/ai-xray-detection/models/convnext_tiny_asl_v2
  seed: 42
